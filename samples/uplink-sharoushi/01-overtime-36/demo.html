<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>①残業上限チェック デモ | アップリンク社労士事務所</title>
  <style>
    :root {
      --ink: #1a2332;
      --muted: #5c6b7a;
      --line: #d7dee7;
      --bg: #f4f7fb;
      --card: #fff;
      --ok: #0f7b4c;
      --warn: #9a3412;
      --accent: #1e3a5f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #e8eef6 0%, var(--bg) 40%);
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 18px;
    }
    .kicker { color: var(--muted); font-size: 13px; margin: 0 0 6px; }
    h1 { font-size: 22px; margin: 0 0 8px; color: var(--accent); }
    .lead { margin: 0; color: var(--muted); font-size: 14px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    button, label.file {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }
    button.primary { background: var(--accent); color: #fff; }
    button.secondary { background: #e8eef6; color: var(--accent); }
    label.file { background: #eef2f7; color: var(--ink); display: inline-flex; align-items: center; gap: 8px; }
    label.file input { display: none; }
    .grid { display: grid; gap: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }
    .card h2 {
      margin: 0;
      padding: 12px 16px;
      font-size: 15px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }
    .table-wrap { overflow: auto; max-height: 360px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f8fafc; }
    tr.warn td { background: #fff7ed; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .pill.ok { background: #dcfce7; color: var(--ok); }
    .pill.ng { background: #ffedd5; color: var(--warn); }
    .note { font-size: 12px; color: var(--muted); margin-top: 10px; }
    .stat { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .stat div {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 120px;
    }
    .stat strong { display: block; font-size: 20px; }
    .stat span { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="kicker">ヒアリング用デモ · アップリンク社労士事務所（架空）</p>
      <h1>① 残業上限チェック（36系）</h1>
      <p class="lead">顧問先「株式会社サンプル製造」のCSVを読み、単月100h / 45h超過回数 / 複数月平均80h / 年720h を一次判定します。Googleシート版と同じロジックです。</p>
      <div class="actions">
        <button class="primary" id="btn-sample" type="button">サンプルCSVで判定</button>
        <label class="file">CSVを選ぶ<input id="file" type="file" accept=".csv,text/csv" /></label>
        <button class="secondary" id="btn-clear" type="button">クリア</button>
      </div>
      <div class="stat" id="stats" hidden>
        <div><strong id="stat-emp">0</strong><span>判定行（従業員×年度）</span></div>
        <div><strong id="stat-ng">0</strong><span>違反あり</span></div>
        <div><strong id="stat-ok">0</strong><span>問題なし</span></div>
      </div>
      <p class="note">本番は顧客Google上のスプレッドシートに同梱GASを置いて共作します。このHTMLはオフライン／社内確認用です。</p>
    </section>

    <div class="grid">
      <section class="card">
        <h2>勤怠_残業（入力）</h2>
        <div class="table-wrap"><table id="input-table"><thead></thead><tbody></tbody></table></div>
      </section>
      <section class="card">
        <h2>判定結果</h2>
        <div class="table-wrap"><table id="out-table"><thead></thead><tbody></tbody></table></div>
      </section>
    </div>
  </div>

  <script>
    const SAMPLE_CSV = `従業員ID,氏名,年月,残業時間（h）
E001,山田 太郎,2025/04,38
E001,山田 太郎,2025/05,52
E001,山田 太郎,2025/06,61
E001,山田 太郎,2025/07,48
E001,山田 太郎,2025/08,55
E001,山田 太郎,2025/09,70
E001,山田 太郎,2025/10,66
E001,山田 太郎,2025/11,58
E001,山田 太郎,2025/12,45
E001,山田 太郎,2026/01,40
E001,山田 太郎,2026/02,36
E001,山田 太郎,2026/03,30
E002,佐藤 花子,2025/04,10
E002,佐藤 花子,2025/05,12
E002,佐藤 花子,2025/06,8
E002,佐藤 花子,2025/07,15
E002,佐藤 花子,2025/08,20
E002,佐藤 花子,2025/09,18
E002,佐藤 花子,2025/10,22
E002,佐藤 花子,2025/11,16
E002,佐藤 花子,2025/12,12
E002,佐藤 花子,2026/01,10
E002,佐藤 花子,2026/02,9
E002,佐藤 花子,2026/03,11
E003,鈴木 一郎,2025/04,90
E003,鈴木 一郎,2025/05,95
E003,鈴木 一郎,2025/06,102
E003,鈴木 一郎,2025/07,88
E003,鈴木 一郎,2025/08,92
E003,鈴木 一郎,2025/09,85
E003,鈴木 一郎,2025/10,78
E003,鈴木 一郎,2025/11,70
E003,鈴木 一郎,2025/12,60
E003,鈴木 一郎,2026/01,55
E003,鈴木 一郎,2026/02,50
E003,鈴木 一郎,2026/03,48`;

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      const header = lines[0].split(',');
      const rows = lines.slice(1).map((line) => {
        const cols = line.split(',');
        const obj = {};
        header.forEach((h, i) => obj[h] = cols[i]);
        return obj;
      });
      return { header, rows };
    }

    function normalizeYm(s) {
      const t = String(s).trim().replace(/-/g, '/');
      const p = t.split('/');
      if (p.length < 2) return null;
      return { y: Number(p[0]), m: Number(p[1]) };
    }

    function fyMonths(fy) {
      const a = [];
      for (let m = 4; m <= 12; m++) a.push({ y: fy, m });
      for (let m = 1; m <= 3; m++) a.push({ y: fy + 1, m });
      return a;
    }

    function addMonths(y, m, delta) {
      let mm = m + delta, yy = y;
      while (mm < 1) { mm += 12; yy--; }
      while (mm > 12) { mm -= 12; yy++; }
      return { y: yy, m: mm };
    }

    function fmt(y, m) {
      return y + '/' + String(m).padStart(2, '0');
    }

    function checkViolations(rows) {
      const emp = {};
      rows.forEach((r) => {
        const parts = normalizeYm(r['年月']);
        const ot = Number(r['残業時間（h）']);
        if (!parts || Number.isNaN(ot)) return;
        let id = (r['従業員ID'] || '').trim();
        const name = (r['氏名'] || '').trim();
        if (!id) id = name || 'UNKNOWN';
        if (!emp[id]) emp[id] = { name, months: {} };
        emp[id].name = name || emp[id].name;
        emp[id].months[parts.y + '-' + parts.m] = ot;
      });

      const out = [];
      Object.keys(emp).sort().forEach((id) => {
        const data = emp[id];
        const fys = {};
        Object.keys(data.months).forEach((key) => {
          const [y, m] = key.split('-').map(Number);
          const fy = m >= 4 ? y : y - 1;
          if (!fys[fy]) fys[fy] = true;
        });
        Object.keys(fys).map(Number).sort().forEach((fy) => {
          const months = fyMonths(fy);
          let total = 0, over45 = 0;
          const violations = {};
          months.forEach((ym) => {
            const key = ym.y + '-' + ym.m;
            const hours = data.months[key] != null ? Number(data.months[key]) : 0;
            total += hours;
            if (hours > 45) over45++;
            if (hours > 100) violations[`単月100h超過 (${fmt(ym.y, ym.m)}: ${hours}h)`] = true;
            for (let w = 2; w <= 6; w++) {
              let sum = 0;
              for (let i = 0; i < w; i++) {
                const t = addMonths(ym.y, ym.m, -i);
                const hk = t.y + '-' + t.m;
                sum += data.months[hk] != null ? Number(data.months[hk]) : 0;
              }
              const avg = sum / w;
              if (avg > 80) violations[`複数月平均80h超過 (${w}ヶ月平均: ${avg.toFixed(1)}h - ${fmt(ym.y, ym.m)}時点)`] = true;
            }
          });
          if (total > 720) violations[`年間上限超過 (${total.toFixed(1)}h)`] = true;
          if (over45 > 6) violations[`45h超え回数違反 (${over45}回)`] = true;
          out.push({
            id, name: data.name, fy, total: Math.round(total * 100) / 100, over45,
            violations: Object.keys(violations).sort()
          });
        });
      });
      return out;
    }

    function renderTable(table, header, rows, rowClassFn) {
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      thead.innerHTML = '<tr>' + header.map((h) => `<th>${h}</th>`).join('') + '</tr>';
      tbody.innerHTML = rows.map((r) => {
        const cls = rowClassFn ? rowClassFn(r) : '';
        return `<tr class="${cls}">` + r.map((c) => `<td>${c}</td>`).join('') + '</tr>';
      }).join('');
    }

    function run(text) {
      const { header, rows } = parseCsv(text);
      renderTable(
        document.getElementById('input-table'),
        header,
        rows.map((r) => header.map((h) => r[h]))
      );
      const results = checkViolations(rows);
      const outRows = results.map((r) => {
        const ok = r.violations.length === 0;
        return [
          r.id,
          r.name,
          r.fy,
          r.total,
          r.over45,
          ok ? '<span class="pill ok">問題なし</span>' : `<span class="pill ng">違反</span> ${r.violations.join(' / ')}`
        ];
      });
      renderTable(
        document.getElementById('out-table'),
        ['従業員ID', '氏名', '年度(4月始まり)', '年間残業h', '45h超過回数', '違反・注意'],
        outRows,
        (r) => (String(r[5]).includes('違反') ? 'warn' : '')
      );
      const ng = results.filter((r) => r.violations.length).length;
      document.getElementById('stats').hidden = false;
      document.getElementById('stat-emp').textContent = results.length;
      document.getElementById('stat-ng').textContent = ng;
      document.getElementById('stat-ok').textContent = results.length - ng;
    }

    document.getElementById('btn-sample').addEventListener('click', () => run(SAMPLE_CSV));
    document.getElementById('file').addEventListener('change', async (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      run(await f.text());
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
      ['input-table', 'out-table'].forEach((id) => {
        document.querySelector(`#${id} thead`).innerHTML = '';
        document.querySelector(`#${id} tbody`).innerHTML = '';
      });
      document.getElementById('stats').hidden = true;
    });

    run(SAMPLE_CSV);
  </script>
</body>
</html>
