<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プラン比較 - 労務コンプライアンスチェッカー</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #1f2937;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        th,
        td {
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem;
        }

        th {
            background-color: #eff6ff;
            color: #1e3a8a;
            font-weight: 700;
            text-align: center;
        }

        td {
            text-align: center;
        }

        td:first-child,
        th:first-child {
            text-align: left;
            font-weight: 500;
        }

        .btn-back {
            display: block;
            width: 100%;
            text-align: center;
            background-color: #6b7280;
            color: white;
            padding: 0.875rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-back:hover {
            background-color: #4b5563;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>無料版・有料版 機能比較</h1>

        <div style="background: #f8fafc; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 30%;">機能</th>
                        <th style="width: 35%;">無料版 (本アプリ)</th>
                        <th style="width: 35%;">有料版 (Pro)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>従業員数チェック</td>
                        <td style="font-weight: bold; color: #ef4444;">10名まで</td>
                        <td style="font-weight: bold; color: #2563eb;">無制限</td>
                    </tr>
                    <tr>
                        <td>36協定判定</td>
                        <td>○</td>
                        <td>○</td>
                    </tr>
                    <tr>
                        <td>複数月平均</td>
                        <td>○</td>
                        <td>○</td>
                    </tr>
                    <tr>
                        <td>サポート</td>
                        <td>なし</td>
                        <td>優先サポート</td>
                    </tr>
                    <tr>
                        <td>アップデート</td>
                        <td>手動再DL</td>
                        <td>自動更新</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top: 2rem; text-align: center;">
            <p style="font-size: 0.9rem; color: #6b7280; margin-bottom: 1.5rem;">
                有料版のご契約・お問い合わせは <a href="#" style="color: #2563eb;">こちら</a> から
            </p>
            <a href="/" class="btn-back">← トップページに戻る</a>
        </div>
    </div>
</body>

</html>
